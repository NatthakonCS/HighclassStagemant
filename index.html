<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Store - บันทึกยอดขาย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
        }
        .card-bg { background-color: #1a1c23; }
        .accent-green { color: #00e676; }
        .bg-accent-green { background-color: #00e676; }
        .calendar-cell { height: 75px; border: 1px solid #2d3748; transition: all 0.2s; }
        .calendar-cell.has-sales { border-color: #00e676; background-color: rgba(0, 230, 118, 0.05); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .loading-shimmer {
            background: linear-gradient(90deg, #1a1c23 25%, #2d3748 50%, #1a1c23 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="p-4 md:p-8 max-w-lg mx-auto">

    <div class="card-bg rounded-2xl p-6 mb-6 shadow-2xl border border-gray-800">
        <div class="flex justify-between items-end mb-4">
            <div>
                <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-1 uppercase">เดือนนี้ขายได้แล้ว</p>
                <h2 class="text-3xl font-bold accent-green" id="total-sales">฿0</h2>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-1 uppercase flex justify-end items-center gap-1">
                    เป้าหมาย 
                    <button id="edit-target-btn" class="text-gray-500 hover:text-white transition p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                </p>
                <h2 class="text-xl font-semibold text-gray-300" id="target-display">฿30,000</h2>
            </div>
        </div>
        <div class="w-full bg-gray-800 rounded-full h-2.5 mb-2 overflow-hidden">
            <div class="bg-accent-green h-full rounded-full transition-all duration-1000 ease-out" id="progress-bar" style="width: 0%"></div>
        </div>
        <p class="text-[10px] text-gray-500 text-right" id="progress-text">0% ของเป้าหมาย</p>
    </div>

    <div class="card-bg rounded-2xl p-6 mb-6 shadow-lg border border-gray-800">
        <div class="flex items-center gap-2 mb-5">
            <div class="w-1 h-6 bg-accent-green rounded-full"></div>
            <h3 class="text-lg font-bold">บันทึกยอดขายวันนี้</h3>
        </div>
        <form id="sales-form" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">วันที่</label>
                    <input type="date" id="date" required class="w-full bg-gray-900 text-white rounded-xl p-3 outline-none border border-gray-700 focus:border-green-500 transition">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">ยอดเงิน (บาท)</label>
                    <input type="number" id="amount" required placeholder="0" class="w-full bg-gray-900 text-white rounded-xl p-3 outline-none border border-gray-700 focus:border-green-500 transition">
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">รายละเอียด / รายการสินค้า</label>
                <input type="text" id="note" placeholder="เช่น เสื้อ BAPE, กางเกงวินเทจ" class="w-full bg-gray-900 text-white rounded-xl p-3 outline-none border border-gray-700 focus:border-green-500 transition">
            </div>
            <button type="submit" class="w-full bg-accent-green text-black font-black uppercase tracking-wider rounded-xl p-4 mt-2 hover:bg-green-400 transition-all active:scale-[0.98]" id="submit-btn">
                บันทึกข้อมูลลงชีต
            </button>
        </form>
    </div>

    <div class="card-bg rounded-2xl p-6 shadow-lg border border-gray-800 mb-10">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold tracking-tight" id="month-title">...</h3>
            <span class="text-[10px] bg-gray-800 px-3 py-1 rounded-full text-gray-400 font-bold uppercase tracking-widest">Calendar</span>
        </div>
        <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-black text-gray-600 mb-3 tracking-tighter">
            <div>อา.</div><div>จ.</div><div>อ.</div><div>พ.</div><div>พฤ.</div><div>ศ.</div><div>ส.</div>
        </div>
        <div id="calendar-grid" class="grid grid-cols-7 gap-1">
            </div>
    </div>

    <script>
        // 1. วาง URL ของ Google Apps Script ตรงนี้
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzaKBJ_alqpsFcjMQ-QwVuIcn96HM5kAXEOyUEJYQ5EWqOLzXGC3jYKqVKa04p4pdpV/exec'; 

        // 2. ตั้งค่าเบื้องต้น
        document.getElementById('date').valueAsDate = new Date();
        let targetAmount = localStorage.getItem('monthlyTarget') ? Number(localStorage.getItem('monthlyTarget')) : 30000;

        function formatTHB(amount) {
            return new Intl.NumberFormat('th-TH', { 
                style: 'currency', 
                currency: 'THB', 
                minimumFractionDigits: 0,
                maximumFractionDigits: 0 
            }).format(amount);
        }

        function updateTargetUI() {
            document.getElementById('target-display').innerText = formatTHB(targetAmount);
        }

        // 3. ฟังก์ชันดึงข้อมูลจาก Sheets
        async function loadData() {
            const grid = document.getElementById('calendar-grid');
            if (grid.children.length === 0) {
                grid.innerHTML = Array(28).fill('<div class="calendar-cell rounded-lg loading-shimmer"></div>').join('');
            }

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                renderCalendar(data);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // 4. ฟังก์ชันสร้างปฏิทิน
        function renderCalendar(salesData) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('month-title').innerText = `${monthNames[month]} ${year + 543}`;

            let dailyTotals = {};
            let monthlyTotal = 0;

            salesData.forEach(row => {
                const rowDate = new Date(row.date);
                if (rowDate.getFullYear() === year && rowDate.getMonth() === month) {
                    const dateKey = rowDate.getDate();
                    dailyTotals[dateKey] = (dailyTotals[dateKey] || 0) + Number(row.amount);
                    monthlyTotal += Number(row.amount);
                }
            });

            // อัปเดตยอดรวมและหลอด Progress
            document.getElementById('total-sales').innerText = formatTHB(monthlyTotal);
            updateTargetUI();
            const percent = Math.min((monthlyTotal / targetAmount) * 100, 100);
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').innerText = `${percent.toFixed(1)}% ของเป้าหมาย`;

            // วาดปฏิทิน
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="calendar-cell border-none"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const sales = dailyTotals[day] || 0;
                const isToday = day === now.getDate();
                const cellClass = sales > 0 ? 'calendar-cell has-sales rounded-xl' : 'calendar-cell rounded-xl border-gray-800';
                
                grid.innerHTML += `
                    <div class="${cellClass} flex flex-col justify-center items-center p-1">
                        <span class="text-[11px] ${isToday ? 'bg-white text-black w-5 h-5 rounded-full flex items-center justify-center font-black' : 'text-gray-500 font-bold'}">${day}</span>
                        ${sales > 0 ? `<span class="accent-green text-[9px] font-black mt-1 leading-none">฿${sales.toLocaleString()}</span>` : ''}
                    </div>
                `;
            }
        }

        // 5. ระบบแก้ไขเป้าหมาย
        document.getElementById('edit-target-btn').addEventListener('click', () => {
            const newTarget = prompt("ตั้งเป้าหมายยอดขายใหม่สำหรับเดือนนี้ (บาท):", targetAmount);
            if (newTarget && !isNaN(newTarget)) {
                targetAmount = Number(newTarget);
                localStorage.setItem('monthlyTarget', targetAmount);
                loadData();
            }
        });

        // 6. ระบบส่งข้อมูล
        document.getElementById('sales-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalBtnText = btn.innerText;
            
            btn.innerText = 'กำลังส่งข้อมูล...';
            btn.disabled = true;

            const payload = {
                date: document.getElementById('date').value,
                amount: document.getElementById('amount').value,
                note: document.getElementById('note').value
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // สำคัญ: ป้องกันปัญหา CORS
                    body: JSON.stringify(payload)
                });
                
                // เคลียร์ค่า
                document.getElementById('amount').value = '';
                document.getElementById('note').value = '';
                btn.innerText = 'บันทึกสำเร็จ!';
                btn.classList.replace('bg-accent-green', 'bg-blue-500');

                setTimeout(() => {
                    btn.innerText = originalBtnText;
                    btn.disabled = false;
                    btn.classList.replace('bg-blue-500', 'bg-accent-green');
                    loadData();
                }, 1500);

            } catch (error) {
                alert('เกิดข้อผิดพลาดในการบันทึก');
                btn.disabled = false;
                btn.innerText = originalBtnText;
            }
        });

        // เริ่มโหลดข้อมูล
        loadData();
    </script>
</body>
</html>
