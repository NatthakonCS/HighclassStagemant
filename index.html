        // วาง URL ของเว็บแอป (ล่าสุด) ตรงนี้ครับ

        // ==========================================

        let globalSalesData = [];
        let cashflowChartInst = null;
        let incomeCatChartInst = null;
        let expenseCatChartInst = null; 
        let targetAmount = localStorage.getItem('monthlyTarget') ? Number(localStorage.getItem('monthlyTarget')) : 30000;
        let currentViewDate = new Date(); 

        const categories = {
            income: ["Fashion", "Authentic", "Hoodie/ Sweater", "Polo", "Sport Wear", "Woman", "อื่นๆ"],
            expense: ["ต้นทุนสินค้า (สต็อก)", "ค่าขนส่ง/แพ็คเกจ", "ค่าโฆษณา/โปรโมท", "ค่าอุปกรณ์ร้าน", "เบ็ดเตล็ด (อื่นๆ)"]
        };

        document.getElementById('date').valueAsDate = new Date();
        populateCategories('income');

        function setTransactionType(type) {
            document.getElementById('transaction-type').value = type;
            const bg = document.getElementById('toggle-bg');
            const btnInc = document.getElementById('btn-type-income');
            const btnExp = document.getElementById('btn-type-expense');
            const submitBtn = document.getElementById('submit-btn');
            const addIcon = document.getElementById('add-btn-icon');
            const phoneContainer = document.getElementById('phone-container');

            populateCategories(type);

            if(type === 'income') {
                bg.style.transform = 'translateX(0)';
                bg.className = 'absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-accent-green rounded-lg transition-all duration-300';
                btnInc.classList.replace('text-gray-400', 'text-black');
                btnExp.classList.replace('text-white', 'text-gray-400');
                submitBtn.innerText = 'บันทึกรายรับ';
                submitBtn.className = 'w-full bg-accent-green text-black font-black uppercase rounded-xl p-4 mt-4';
                addIcon.className = 'absolute -top-6 bg-accent-green text-black rounded-full p-3 shadow-lg';
                phoneContainer.style.display = 'block';
            } else {
                bg.style.transform = 'translateX(100%)';
                bg.className = 'absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-accent-red rounded-lg transition-all duration-300';
                btnExp.classList.replace('text-gray-400', 'text-white');
                btnInc.classList.replace('text-black', 'text-gray-400');
                submitBtn.innerText = 'บันทึกรายจ่าย';
                submitBtn.className = 'w-full bg-accent-red text-white font-black uppercase rounded-xl p-4 mt-4';
                addIcon.className = 'absolute -top-6 bg-accent-red text-white rounded-full p-3 shadow-lg shadow-red-900/50';
                phoneContainer.style.display = 'none';
            }
        }

        function populateCategories(type) {
            const select = document.getElementById('category');
            select.innerHTML = '';
            categories[type].forEach(cat => {
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        }

        function changeMonth(offset) {
            currentViewDate.setMonth(currentViewDate.getMonth() + offset);
            renderDashboard();
            if(!document.getElementById('view-stats').classList.contains('hidden')) renderCharts();
        }

        function switchTab(tabId) {
            window.scrollTo({ top: 0, behavior: 'instant' }); 
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'text-green-500'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('active', 'text-green-500');
            
            if(tabId === 'dashboard' && (currentViewDate.getMonth() !== new Date().getMonth() || currentViewDate.getFullYear() !== new Date().getFullYear())) {
                currentViewDate = new Date();
                renderDashboard();
            }
            if(tabId === 'stats' && globalSalesData.length > 0) renderCharts();
        }

        function formatTHB(amount) {
            return new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', minimumFractionDigits: 0 }).format(amount);
        }

        async function loadData() {
            const status = document.getElementById('connection-status');
            status.classList.replace('bg-yellow-500', 'bg-blue-500'); 
            try {
                const response = await fetch(SCRIPT_URL);
                globalSalesData = await response.json();
                status.classList.replace('bg-blue-500', 'bg-green-500'); 
                status.classList.remove('animate-pulse');
                renderDashboard();
                if(!document.getElementById('view-stats').classList.contains('hidden')) renderCharts();
            } catch (error) {
                status.classList.replace('bg-blue-500', 'bg-red-500'); 
            }
        }

        function renderDashboard() {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            let incTotal = 0;
            let expTotal = 0;
            let dailyData = {};

            globalSalesData.forEach(row => {
                const rowDate = new Date(row.date);
                if (rowDate.getFullYear() === year && rowDate.getMonth() === month) {
                    const val = Number(row.amount);
                    const isIncome = row.type === 'income';
                    const day = rowDate.getDate();
                    
                    if(!dailyData[day]) dailyData[day] = { inc: 0, exp: 0 };
                    
                    if(isIncome) {
                        incTotal += val;
                        dailyData[day].inc += val;
                    } else {
                        expTotal += val;
                        dailyData[day].exp += val;
                    }
                }
            });

            const isRealCurrentMonth = (year === new Date().getFullYear() && month === new Date().getMonth());
            const monthNamesShort = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            document.getElementById('dashboard-total-title').innerText = isRealCurrentMonth ? "กำไรสุทธิเดือนนี้" : `กำไรสุทธิเดือน ${monthNamesShort[month]} ${year + 543}`;

                        <input type="tel" id="phone" placeholder="08X-XXX-XXXX (ไม่บังคับ)" class="w-full bg-gray-900 text-white rounded-xl p-3 border border-gray-700 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1">รายละเอียด (Note)</label>
                        <input type="text" id="note" placeholder="ไซส์, ตำหนิ, หรือรายละเอียดค่าใช้จ่าย" class="w-full bg-gray-900 text-white rounded-xl p-3 border border-gray-700 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-accent-green text-black font-black uppercase rounded-xl p-4 mt-4 transition-colors duration-300" id="submit-btn">
                        บันทึกรายรับ
                    </button>
                </form>
            </div>
        </div>

        <!-- ==================== VIEW 3: ANALYTICS ==================== -->
        <div id="view-stats" class="view-section hidden">
            <!-- กราฟรายเดือน รับ vs จ่าย -->
            <div class="card-bg rounded-2xl p-5 mb-5 border border-gray-800">
                <h3 class="text-sm font-bold mb-4">📊 กระแสเงินสด (รับ vs จ่าย)</h3>
                <div class="chart-container">
                    <canvas id="cashflowChart"></canvas>
                </div>
            </div>

            <!-- กราฟโดนัท หมวดหมู่รายรับ -->
            <div class="card-bg rounded-2xl p-5 mb-5 border border-gray-800">
                <h3 class="text-sm font-bold mb-4" id="stats-cat-income">🏆 สัดส่วนรายรับ (เดือนนี้)</h3>
                <div class="chart-container">
                    <canvas id="incomeCategoryChart"></canvas>
                </div>
            </div>

            <!-- กราฟโดนัท หมวดหมู่รายจ่าย -->
            <div class="card-bg rounded-2xl p-5 border border-gray-800">
                <h3 class="text-sm font-bold mb-4" id="stats-cat-expense">🔥 สัดส่วนรายจ่าย (เดือนนี้)</h3>
                <div class="chart-container">
                    <canvas id="expenseCategoryChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- แถบเมนูด้านล่าง -->
    <div class="fixed bottom-0 left-0 w-full bg-[#1a1c23] border-t border-gray-800 pb-safe z-50">
        <div class="max-w-lg mx-auto flex justify-between items-center p-2 px-6">
            <button onclick="switchTab('dashboard')" class="nav-item active flex flex-col items-center p-2 text-gray-500" id="tab-dashboard">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <span class="text-[10px] mt-1 font-bold">หน้าหลัก</span>
            </button>
            <button onclick="switchTab('add')" class="nav-item flex flex-col items-center p-2 text-gray-500 relative" id="tab-add">
                <div class="absolute -top-6 bg-accent-green text-black rounded-full p-3 shadow-lg" id="add-btn-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
                <span class="text-[10px] mt-6 font-bold">บันทึกยอด</span>
            </button>
            <button onclick="switchTab('stats')" class="nav-item flex flex-col items-center p-2 text-gray-500" id="tab-stats">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"></path><path d="M18 20V4"></path><path d="M6 20v-4"></path></svg>
                <span class="text-[10px] mt-1 font-bold">สถิติ</span>
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // ใส่ SCRIPT_URL ตรงนี้ครับ (อย่าลืมอัปเดตโค้ด GAS ใหม่ด้วย)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLiwJ2FZTTEg57fhZBNrwVtLBBSOa0WUtbJNAe454wQvlqCGbVjrhd72940F-HPFf-Kw/exec'; 
        // ==========================================

        let globalSalesData = [];
        let cashflowChartInst = null;
        let incomeCatChartInst = null;
        let expenseCatChartInst = null; 
        let targetAmount = localStorage.getItem('monthlyTarget') ? Number(localStorage.getItem('monthlyTarget')) : 30000;
        let currentViewDate = new Date(); 

        const categories = {
            income: ["Fashion", "Authentic", "Hoodie/ Sweater", "Polo", "Sport Wear", "Woman", "อื่นๆ"],
            expense: ["ต้นทุนสินค้า (สต็อก)", "ค่าขนส่ง/แพ็คเกจ", "ค่าโฆษณา/โปรโมท", "ค่าอุปกรณ์ร้าน", "เบ็ดเตล็ด (อื่นๆ)"]
        };

        document.getElementById('date').valueAsDate = new Date();
        populateCategories('income');

        // ฟังก์ชันจัดการ Toggle สลับรับ/จ่าย
        function setTransactionType(type) {
            document.getElementById('transaction-type').value = type;
            const bg = document.getElementById('toggle-bg');
            const btnInc = document.getElementById('btn-type-income');
            const btnExp = document.getElementById('btn-type-expense');
            const submitBtn = document.getElementById('submit-btn');
            const addIcon = document.getElementById('add-btn-icon');
            const phoneContainer = document.getElementById('phone-container');

            populateCategories(type);

            if(type === 'income') {
                bg.style.transform = 'translateX(0)';
                bg.className = 'absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-accent-green rounded-lg transition-all duration-300';
                btnInc.classList.replace('text-gray-400', 'text-black');
                btnExp.classList.replace('text-white', 'text-gray-400');
                
                submitBtn.innerText = 'บันทึกรายรับ';
                submitBtn.className = 'w-full bg-accent-green text-black font-black uppercase rounded-xl p-4 mt-4 transition-colors duration-300';
                addIcon.className = 'absolute -top-6 bg-accent-green text-black rounded-full p-3 shadow-lg';
                phoneContainer.style.display = 'block';
            } else {
                bg.style.transform = 'translateX(100%)';
                bg.className = 'absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-accent-red rounded-lg transition-all duration-300';
                btnExp.classList.replace('text-gray-400', 'text-white');
                btnInc.classList.replace('text-black', 'text-gray-400');
                
                submitBtn.innerText = 'บันทึกรายจ่าย';
                submitBtn.className = 'w-full bg-accent-red text-white font-black uppercase rounded-xl p-4 mt-4 transition-colors duration-300';
                addIcon.className = 'absolute -top-6 bg-accent-red text-white rounded-full p-3 shadow-lg shadow-red-900/50';
                phoneContainer.style.display = 'none'; // ซ่อนเบอร์ลูกค้าตอนกรอกรายจ่าย
            }
        }

        function populateCategories(type) {
            const select = document.getElementById('category');
            select.innerHTML = '';
            categories[type].forEach(cat => {
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        }

        function changeMonth(offset) {
            currentViewDate.setMonth(currentViewDate.getMonth() + offset);
            renderDashboard();
            if(!document.getElementById('view-stats').classList.contains('hidden')) renderCharts();
        }

        function switchTab(tabId) {
            window.scrollTo({ top: 0, behavior: 'instant' }); 
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'text-green-500'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('active', 'text-green-500');
            
            if(tabId === 'dashboard' && (currentViewDate.getMonth() !== new Date().getMonth() || currentViewDate.getFullYear() !== new Date().getFullYear())) {
                currentViewDate = new Date();
                renderDashboard();
            }
            if(tabId === 'stats' && globalSalesData.length > 0) renderCharts();
        }

        function formatTHB(amount) {
            return new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', minimumFractionDigits: 0 }).format(amount);
        }

        async function loadData() {
            const status = document.getElementById('connection-status');
            status.classList.replace('bg-yellow-500', 'bg-blue-500'); 
            try {
                const response = await fetch(SCRIPT_URL);
                globalSalesData = await response.json();
                status.classList.replace('bg-blue-500', 'bg-green-500'); 
                status.classList.remove('animate-pulse');
                renderDashboard();
                if(!document.getElementById('view-stats').classList.contains('hidden')) renderCharts();
            } catch (error) {
                status.classList.replace('bg-blue-500', 'bg-red-500'); 
            }
        }

        function renderDashboard() {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            let incTotal = 0;
            let expTotal = 0;
            let dailyData = {};

            globalSalesData.forEach(row => {
                const rowDate = new Date(row.date);
                if (rowDate.getFullYear() === year && rowDate.getMonth() === month) {
                    const val = Number(row.amount);
                    const isIncome = row.type === 'income' || !row.type;
                    const day = rowDate.getDate();
                    
                    if(!dailyData[day]) dailyData[day] = { inc: 0, exp: 0 };
                    
                    if(isIncome) {
                        incTotal += val;
                        dailyData[day].inc += val;
                    } else {
                        expTotal += val;
                        dailyData[day].exp += val;
                    }
                }
            });

            const isRealCurrentMonth = (year === new Date().getFullYear() && month === new Date().getMonth());
            const monthNamesShort = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            document.getElementById('dashboard-total-title').innerText = isRealCurrentMonth ? "กำไรสุทธิเดือนนี้" : `กำไรสุทธิเดือน ${monthNamesShort[month]} ${year + 543}`;
            
            document.getElementById('total-income').innerText = formatTHB(incTotal);
            document.getElementById('total-expense').innerText = formatTHB(expTotal);
            document.getElementById('net-profit').innerText = formatTHB(incTotal - expTotal);
            
            document.getElementById('target-display').innerText = formatTHB(targetAmount);
            const percent = Math.min((incTotal / targetAmount) * 100, 100);
            document.getElementById('progress-bar').style.width = `${percent}%`;

            renderCalendarUI(year, month, dailyData);
        }

        function renderCalendarUI(year, month, dailyData) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            
            document.getElementById('month-title').innerText = `${monthNames[month]} ${year + 543}`;
            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

            const isRealCurrentMonth = (year === new Date().getFullYear() && month === new Date().getMonth());
            const todayDate = isRealCurrentMonth ? new Date().getDate() : null;

            for (let day = 1; day <= daysInMonth; day++) {
                const data = dailyData[day] || {inc: 0, exp: 0};
                const hasData = data.inc > 0 || data.exp > 0;
                const isToday = day === todayDate;
                const cellClass = hasData ? 'calendar-cell has-data rounded-lg' : 'calendar-cell rounded-lg border-gray-800';
                
                let amountsHtml = '';
                if(data.inc > 0) amountsHtml += `<span class="accent-green text-[8px] font-bold mt-[2px] leading-tight">+${(data.inc/1000).toFixed(1)}k</span>`;
                if(data.exp > 0) amountsHtml += `<span class="accent-red text-[8px] font-bold leading-tight">-${(data.exp/1000).toFixed(1)}k</span>`;

                grid.innerHTML += `
                    <div class="${cellClass} flex flex-col justify-center items-center p-1">
                        <span class="text-[11px] ${isToday ? 'bg-white text-black w-5 h-5 rounded-full flex items-center justify-center font-bold' : 'text-gray-400 font-semibold'}">${day}</span>
                        ${amountsHtml}
                    </div>
                `;
            }
        }

        function renderCharts() {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const monthNamesShort = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            
            // 1. All-time Cashflow
            const monthlyTotals = {};
            globalSalesData.forEach(row => {
                const d = new Date(row.date);
                const rYear = d.getFullYear();
                const rMonth = d.getMonth();
                const key = `${rYear}-${String(rMonth).padStart(2, '0')}`; 
                const label = `${monthNamesShort[rMonth]} ${String(rYear + 543).slice(-2)}`; 
                
                if(!monthlyTotals[key]) monthlyTotals[key] = { label: label, inc: 0, exp: 0 };
                
                if (row.type === 'expense') monthlyTotals[key].exp += Number(row.amount);
                else monthlyTotals[key].inc += Number(row.amount);
            });

            const sortedKeys = Object.keys(monthlyTotals).sort();
            const cashflowLabels = sortedKeys.map(k => monthlyTotals[k].label);
            const incData = sortedKeys.map(k => monthlyTotals[k].inc);
            const expData = sortedKeys.map(k => monthlyTotals[k].exp);

            // 2. Categories for selected month
            const incCatTotals = {};
            const expCatTotals = {};

            globalSalesData.forEach(row => {
                const d = new Date(row.date);
                if (d.getMonth() === month && d.getFullYear() === year) {
                    const cat = row.category || 'อื่นๆ';
                    if (row.type === 'expense') {
                        expCatTotals[cat] = (expCatTotals[cat] || 0) + Number(row.amount);
                    } else {
                        incCatTotals[cat] = (incCatTotals[cat] || 0) + Number(row.amount);
                    }
                }
            });

            Chart.defaults.color = '#718096'; 
            Chart.defaults.font.family = 'Inter';

            // Cashflow Bar Chart
            if(cashflowChartInst) cashflowChartInst.destroy();
            cashflowChartInst = new Chart(document.getElementById('cashflowChart'), {
                type: 'bar',
                data: { 
                    labels: cashflowLabels, 
                    datasets: [
                        { label: 'รายรับ', data: incData, backgroundColor: '#00e676', borderRadius: 2 },
                        { label: 'รายจ่าย', data: expData, backgroundColor: '#ef4444', borderRadius: 2 }
                    ] 
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: '#2d3748' } }, x: { grid: { display: false } } } }
            });

            // Income Donut
            if(incomeCatChartInst) incomeCatChartInst.destroy();
            incomeCatChartInst = new Chart(document.getElementById('incomeCategoryChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(incCatTotals), datasets: [{ data: Object.values(incCatTotals), backgroundColor: ['#00e676', '#3b82f6', '#f59e0b', '#ec4899', '#8b5cf6', '#a855f7'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } }, cutout: '70%' }
            });

            // Expense Donut
            if(expenseCatChartInst) expenseCatChartInst.destroy();
            expenseCatChartInst = new Chart(document.getElementById('expenseCategoryChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(expCatTotals), datasets: [{ data: Object.values(expCatTotals), backgroundColor: ['#ef4444', '#f97316', '#eab308', '#ec4899', '#6b7280'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } }, cutout: '70%' }
            });
        }

        document.getElementById('sales-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const type = document.getElementById('transaction-type').value;
            btn.innerText = 'กำลังบันทึก...';
            btn.disabled = true;

            const payload = {
                type: type,
                date: document.getElementById('date').value,
                amount: document.getElementById('amount').value,
                category: document.getElementById('category').value,
                phone: document.getElementById('phone').value,
                note: document.getElementById('note').value
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                document.getElementById('amount').value = '';
                document.getElementById('phone').value = '';
                document.getElementById('note').value = '';
                
                btn.innerText = 'บันทึกสำเร็จ!';
                btn.classList.add('bg-blue-500');
                
                setTimeout(() => {
                    setTransactionType(type); // Reset styles
                    btn.disabled = false;
                    loadData(); 
                    switchTab('dashboard'); 
                }, 1500);
            } catch (error) {
                alert('ส่งข้อมูลไม่สำเร็จ กรุณาลองใหม่');
                setTransactionType(type);
                btn.disabled = false;
            }
        });

        document.getElementById('edit-target-btn').addEventListener('click', () => {
            const newTarget = prompt("ตั้งเป้าหมายรายรับใหม่ (บาท):", targetAmount);
            if (newTarget && !isNaN(newTarget)) {
                targetAmount = Number(newTarget);
                localStorage.setItem('monthlyTarget', targetAmount);
                renderDashboard();
            }
        });

        loadData();
    </script>
</body>
</html>
