<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HighClass Sales Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0b0c10; 
            color: #ffffff; 
            padding-bottom: 80px; 
            overscroll-behavior-y: none;
        }
        .card-bg { background-color: #1a1c23; }
        .accent-green { color: #00e676; }
        .bg-accent-green { background-color: #00e676; }
        .calendar-cell { height: 60px; border: 1px solid #2d3748; transition: all 0.2s; }
        .calendar-cell.has-sales { border-color: #00e676; background-color: rgba(0, 230, 118, 0.05); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .nav-item.active { color: #00e676; }
        ::-webkit-scrollbar { display: none; }
        
        .chart-container {
            position: relative;
            height: 240px; 
            width: 100%;
            overflow: hidden;
        }
        .chart-container canvas {
            position: absolute !important;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body class="max-w-lg mx-auto">

    <div class="p-5 pt-8 sticky top-0 bg-[#0b0c10] z-10 flex justify-between items-center border-b border-gray-800">
        <h1 class="text-xl font-bold tracking-wider">HIGH<span class="text-gray-400">CLASS</span></h1>
        <div id="connection-status" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
    </div>

    <div class="p-4" id="main-content">
        
        <div id="view-dashboard" class="view-section">
            <div class="card-bg rounded-2xl p-6 mb-6 shadow-2xl border border-gray-800">
                <div class="flex justify-between items-end mb-2">
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-1 uppercase">ยอดขายเดือนนี้</p>
                        <h2 class="text-3xl font-bold accent-green" id="total-sales">฿0</h2>
                        <p class="text-xs text-gray-400 mt-1" id="mom-compare">เทียบกับเดือนที่แล้ว: <span class="text-gray-500">กำลังคำนวณ...</span></p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-1 uppercase flex justify-end items-center gap-1">
                            เป้าหมาย 
                            <button id="edit-target-btn" class="text-gray-500 hover:text-white transition p-1 cursor-pointer">✏️</button>
                        </p>
                        <h2 class="text-xl font-semibold text-gray-300" id="target-display">฿30,000</h2>
                    </div>
                </div>
                <div class="w-full bg-gray-800 rounded-full h-2 mb-2 overflow-hidden mt-4">
                    <div class="bg-accent-green h-full rounded-full transition-all duration-1000 ease-out" id="progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="card-bg rounded-2xl p-5 shadow-lg border border-gray-800">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold tracking-tight" id="month-title">ปฏิทินยอดขาย</h3>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-black text-gray-500 mb-2">
                    <div>อา.</div><div>จ.</div><div>อ.</div><div>พ.</div><div>พฤ.</div><div>ศ.</div><div>ส.</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
            </div>
        </div>

        <div id="view-add" class="view-section hidden">
            <div class="card-bg rounded-2xl p-6 shadow-lg border border-gray-800">
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-1 h-6 bg-accent-green rounded-full"></div>
                    <h3 class="text-lg font-bold">บันทึกยอดขายใหม่</h3>
                </div>
                <form id="sales-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 mb-1">วันที่</label>
                            <input type="date" id="date" required class="w-full bg-gray-900 text-white rounded-xl p-3 border border-gray-700 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 mb-1">ยอดเงิน (บาท)</label>
                            <input type="number" id="amount" required placeholder="0" class="w-full bg-gray-900 text-white rounded-xl p-3 border border-gray-700 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1">หมวดหมู่สินค้า</label>
                        <select id="category" class="w-full bg-gray-900 text-white rounded-xl p-3 border border-gray-700 outline-none appearance-none">
                            <option value="Fashion">Fashion</option>
                            <option value="Authentic">Authentic</option>
                            <option value="Hoodie/ Sweater">Hoodie/ Sweater</option>
                            <option value="Polo">Polo</option>
                            <option value="Sport Wear">Sport Wear</option>
                            <option value="Woman">Woman</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1">เบอร์โทรลูกค้า (สะสมแต้ม)</label>
                        <input type="tel" id="phone" placeholder="08X-XXX-XXXX (ไม่บังคับ)" class="w-full bg-gray-900 text-white rounded-xl p-3 border border-gray-700 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1">รายละเอียด</label>
                        <input type="text" id="note" placeholder="ไซส์, ตำหนิ, หรือชื่อลูกค้า" class="w-full bg-gray-900 text-white rounded-xl p-3 border border-gray-700 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-accent-green text-black font-black uppercase rounded-xl p-4 mt-4" id="submit-btn">
                        บันทึกข้อมูล
                    </button>
                </form>
            </div>
        </div>

        <div id="view-stats" class="view-section hidden">
            <div class="card-bg rounded-2xl p-5 mb-5 border border-gray-800 flex justify-between items-center shadow-lg">
                <div>
                    <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-1 uppercase">ยอดขายรวมทั้งหมด</p>
                    <h2 class="text-2xl font-bold text-white" id="all-time-sales">฿0</h2>
                </div>
                <div class="w-12 h-12 bg-green-900/30 rounded-full flex items-center justify-center text-green-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>
            </div>

            <div class="card-bg rounded-2xl p-5 mb-5 border border-gray-800">
                <h3 class="text-sm font-bold mb-4">📊 แนวโน้มยอดขายแต่ละเดือน</h3>
                <div class="chart-container">
                    <canvas id="monthlyTrendChart"></canvas>
                </div>
            </div>

            <div class="card-bg rounded-2xl p-5 mb-5 border border-gray-800">
                <h3 class="text-sm font-bold mb-4">📈 ยอดขายรายวัน (เดือนปัจจุบัน)</h3>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <div class="card-bg rounded-2xl p-5 border border-gray-800">
                <h3 class="text-sm font-bold mb-4">🏆 สัดส่วนรายได้ตามหมวดหมู่ (เดือนปัจจุบัน)</h3>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-[#1a1c23] border-t border-gray-800 pb-safe z-50">
        <div class="max-w-lg mx-auto flex justify-between items-center p-2 px-6">
            <button onclick="switchTab('dashboard')" class="nav-item active flex flex-col items-center p-2 text-gray-500" id="tab-dashboard">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <span class="text-[10px] mt-1 font-bold">หน้าหลัก</span>
            </button>
            <button onclick="switchTab('add')" class="nav-item flex flex-col items-center p-2 text-gray-500 relative" id="tab-add">
                <div class="absolute -top-6 bg-accent-green text-black rounded-full p-3 shadow-lg shadow-green-900/50">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
                <span class="text-[10px] mt-6 font-bold">บันทึกยอด</span>
            </button>
            <button onclick="switchTab('stats')" class="nav-item flex flex-col items-center p-2 text-gray-500" id="tab-stats">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"></path><path d="M18 20V4"></path><path d="M6 20v-4"></path></svg>
                <span class="text-[10px] mt-1 font-bold">สถิติ</span>
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // ใส่ SCRIPT_URL ตรงนี้ครับ
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyEHaXDNvKpTl2SONwo_5OE59vy5i2t0__QYnlBkkV0q9iGzxO1O7Ixp_DsZmtP6qFHWw/exec'; 
        // ==========================================

        let globalSalesData = [];
        let trendChartInstance = null;
        let categoryChartInstance = null;
        let monthlyChartInstance = null; // ตัวแปรกราฟใหม่
        let targetAmount = localStorage.getItem('monthlyTarget') ? Number(localStorage.getItem('monthlyTarget')) : 30000;

        document.getElementById('date').valueAsDate = new Date();

        function switchTab(tabId) {
            window.scrollTo({ top: 0, behavior: 'instant' }); 

            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'text-green-500'));
            
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('active', 'text-green-500');
            
            if(tabId === 'stats' && globalSalesData.length > 0) renderCharts();
        }

        function formatTHB(amount) {
            return new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', minimumFractionDigits: 0 }).format(amount);
        }

        async function loadData() {
            const statusIndicator = document.getElementById('connection-status');
            statusIndicator.classList.replace('bg-yellow-500', 'bg-blue-500'); 
            
            try {
                const response = await fetch(SCRIPT_URL);
                globalSalesData = await response.json();
                
                statusIndicator.classList.replace('bg-blue-500', 'bg-green-500'); 
                statusIndicator.classList.remove('animate-pulse');
                
                renderDashboard();
                if(!document.getElementById('view-stats').classList.contains('hidden')) renderCharts();

            } catch (error) {
                console.error('Error:', error);
                statusIndicator.classList.replace('bg-blue-500', 'bg-red-500'); 
            }
        }

        function renderDashboard() {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();
            const prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;
            const prevYear = currentMonth === 0 ? currentYear - 1 : currentYear;

            let currentMonthTotal = 0;
            let prevMonthTotal = 0;
            let dailyTotals = {};

            globalSalesData.forEach(row => {
                const rowDate = new Date(row.date);
                const val = Number(row.amount);
                
                if (rowDate.getFullYear() === currentYear && rowDate.getMonth() === currentMonth) {
                    currentMonthTotal += val;
                    const day = rowDate.getDate();
                    dailyTotals[day] = (dailyTotals[day] || 0) + val;
                }
                if (rowDate.getFullYear() === prevYear && rowDate.getMonth() === prevMonth && rowDate.getDate() <= now.getDate()) {
                    prevMonthTotal += val;
                }
            });

            document.getElementById('target-display').innerText = formatTHB(targetAmount);
            document.getElementById('total-sales').innerText = formatTHB(currentMonthTotal);
            
            const percent = Math.min((currentMonthTotal / targetAmount) * 100, 100);
            document.getElementById('progress-bar').style.width = `${percent}%`;

            const momElement = document.getElementById('mom-compare');
            if (prevMonthTotal === 0) {
                momElement.innerHTML = `เทียบกับเดือนที่แล้ว: <span class="text-gray-500">ไม่มีข้อมูล</span>`;
            } else {
                const diff = currentMonthTotal - prevMonthTotal;
                const percentDiff = ((diff / prevMonthTotal) * 100).toFixed(1);
                if (diff >= 0) {
                    momElement.innerHTML = `เทียบกับเดือนที่แล้ว: <span class="text-green-500">▲ +${percentDiff}%</span>`;
                } else {
                    momElement.innerHTML = `เทียบกับเดือนที่แล้ว: <span class="text-red-500">▼ ${percentDiff}%</span>`;
                }
            }

            renderCalendarUI(currentYear, currentMonth, dailyTotals, now.getDate());
        }

        function renderCalendarUI(year, month, dailyTotals, todayDate) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('month-title').innerText = `${monthNames[month]} ${year + 543}`;

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

            for (let day = 1; day <= daysInMonth; day++) {
                const sales = dailyTotals[day] || 0;
                const isToday = day === todayDate;
                const cellClass = sales > 0 ? 'calendar-cell has-sales rounded-lg' : 'calendar-cell rounded-lg border-gray-800';
                
                grid.innerHTML += `
                    <div class="${cellClass} flex flex-col justify-center items-center p-1">
                        <span class="text-[11px] ${isToday ? 'bg-accent-green text-black w-5 h-5 rounded-full flex items-center justify-center font-bold' : 'text-gray-400 font-semibold'}">${day}</span>
                        ${sales > 0 ? `<span class="accent-green text-[8px] font-bold mt-1">฿${sales.toLocaleString()}</span>` : ''}
                    </div>
                `;
            }
        }

        function renderCharts() {
            const now = new Date();
            const monthNamesShort = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            
            // --- 1. คำนวณยอดขายรวมทั้งหมด และ แนวโน้มรายเดือน ---
            let allTimeTotal = 0;
            const monthlyTotals = {};

            globalSalesData.forEach(row => {
                const val = Number(row.amount);
                allTimeTotal += val;
                
                const d = new Date(row.date);
                const year = d.getFullYear();
                const month = d.getMonth();
                
                // สร้าง Key สำหรับจัดกลุ่ม เช่น "2026-07"
                const key = `${year}-${String(month).padStart(2, '0')}`; 
                const label = `${monthNamesShort[month]} ${String(year + 543).slice(-2)}`; // เช่น ก.ค. 69
                
                if(!monthlyTotals[key]) {
                    monthlyTotals[key] = { label: label, total: 0 };
                }
                monthlyTotals[key].total += val;
            });

            // อัปเดตตัวเลขยอดขายรวมทั้งหมด
            document.getElementById('all-time-sales').innerText = formatTHB(allTimeTotal);

            // เรียงข้อมูลรายเดือนตามลำดับเวลา
            const sortedKeys = Object.keys(monthlyTotals).sort();
            const monthlyLabels = sortedKeys.map(k => monthlyTotals[k].label);
            const monthlyData = sortedKeys.map(k => monthlyTotals[k].total);

            // --- 2. คำนวณข้อมูลสำหรับเดือนปัจจุบัน (กราฟเส้นและโดนัท) ---
            const currentMonthData = globalSalesData.filter(row => {
                const d = new Date(row.date);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });

            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const dailyLabels = Array.from({length: daysInMonth}, (_, i) => i + 1);
            const dailyTrendData = Array(daysInMonth).fill(0);
            const categoryTotals = {};

            currentMonthData.forEach(row => {
                const dayIndex = new Date(row.date).getDate() - 1;
                dailyTrendData[dayIndex] += Number(row.amount);
                
                const cat = row.category || 'อื่นๆ';
                categoryTotals[cat] = (categoryTotals[cat] || 0) + Number(row.amount);
            });

            // --- ตั้งค่าสีหลักของ Chart.js ---
            Chart.defaults.color = '#718096'; 
            Chart.defaults.font.family = 'Inter';

            // วาดกราฟแท่งแนวโน้มรายเดือน (ของใหม่)
            if(monthlyChartInstance) monthlyChartInstance.destroy();
            monthlyChartInstance = new Chart(document.getElementById('monthlyTrendChart'), {
                type: 'bar',
                data: {
                    labels: monthlyLabels,
                    datasets: [{
                        label: 'ยอดขาย (บาท)',
                        data: monthlyData,
                        backgroundColor: '#00e676',
                        borderRadius: 4
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#2d3748' } }, 
                        x: { grid: { display: false } } 
                    } 
                }
            });

            // วาดกราฟเส้นแนวโน้มรายวัน
            if(trendChartInstance) trendChartInstance.destroy();
            trendChartInstance = new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: dailyLabels,
                    datasets: [{
                        label: 'ยอดขาย (บาท)',
                        data: dailyTrendData,
                        borderColor: '#3b82f6', // เปลี่ยนสีให้ต่างจากรายเดือนนิดนึง จะได้ดูง่าย
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 2
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#2d3748' } }, 
                        x: { grid: { display: false } } 
                    } 
                }
            });

            // วาดกราฟโดนัท
            if(categoryChartInstance) categoryChartInstance.destroy();
            categoryChartInstance = new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categoryTotals),
                    datasets: [{
                        data: Object.values(categoryTotals),
                        backgroundColor: ['#00e676', '#3b82f6', '#f59e0b', '#ec4899', '#8b5cf6', '#ef4444', '#6b7280'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } 
                    }, 
                    cutout: '70%' 
                }
            });
        }

        document.getElementById('sales-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = 'กำลังอัปโหลด...';
            btn.disabled = true;

            const payload = {
                date: document.getElementById('date').value,
                amount: document.getElementById('amount').value,
                category: document.getElementById('category').value,
                phone: document.getElementById('phone').value,
                note: document.getElementById('note').value
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                document.getElementById('amount').value = '';
                document.getElementById('phone').value = '';
                document.getElementById('note').value = '';
                btn.innerText = 'บันทึกสำเร็จ!';
                btn.classList.add('bg-blue-500');
                
                setTimeout(() => {
                    btn.innerText = 'บันทึกข้อมูล';
                    btn.disabled = false;
                    btn.classList.remove('bg-blue-500');
                    loadData(); 
                    switchTab('dashboard'); 
                }, 1500);

            } catch (error) {
                alert('ส่งข้อมูลไม่สำเร็จ กรุณาลองใหม่');
                btn.innerText = 'บันทึกข้อมูล';
                btn.disabled = false;
            }
        });

        document.getElementById('edit-target-btn').addEventListener('click', () => {
            const newTarget = prompt("ตั้งเป้าหมายยอดขายใหม่สำหรับเดือนนี้ (บาท):", targetAmount);
            if (newTarget && !isNaN(newTarget)) {
                targetAmount = Number(newTarget);
                localStorage.setItem('monthlyTarget', targetAmount);
                renderDashboard();
            }
        });

        loadData();
    </script>
</body>
</html>
